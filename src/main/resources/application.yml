server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: acnecare-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/acnecare}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  signer_key: ${JWT_SIGNER_KEY:fb886b389ba6cd149a7deef483af664b62ff17776eb0d04a991251c0e4fba92e}
  # signer_key: "fb886b389ba6cd149a7deef483af664b62ff17776eb0d04a991251c0e4fba92e"
  access-token-valid-duration: 3600 #in seconds : 20 minutes
  refresh-token-valid-duration: 604800 #a week

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

  data:
    redis:
      host: localhost
      port: 6379
storage:
  upload-dir: ./uploads
  base-url: ${STORAGE_BASE_URL:http://localhost:8080/api}
  max-file-size: 10485760 # 10MB
  allowed-types: image/jpeg,image/png,image/webp,image/gif,application/pdf
  max-user-size: 209715200 # 200MB per user (general)
  max-facescan-user-size: 524288000 # 500MB per user for face scan images

